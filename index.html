<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jai Benjamin | Actor</title>

  <!-- Clean, thin sans-serif similar to Hiro's site -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#0c0c0c;
      --muted: rgba(0,0,0,0.55);
      --muted2: rgba(0,0,0,0.35);
    }

    body{
      margin:0;
      font-family: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:#000;
      color:var(--text);
    }

    /* Full-bleed hero image */
    .hero{
      min-height:100vh;
      background-image:url("headshot2.jpeg");
      background-size:cover;
      background-position:center;
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    /* Subtle wash like the reference */
    .overlay{
      position:absolute;
      inset:0;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.08), rgba(255,255,255,0) 55%),
                  linear-gradient(to bottom, rgba(255,255,255,0.06), rgba(255,255,255,0.0));
      pointer-events:none;
    }

    /* Copy block in the top-left */
    .copy{
      position:relative;
      z-index:2;
      padding: clamp(22px, 4vw, 60px);
      max-width: 520px;
    }

    .name{
      margin:0;
      font-weight:200;
      letter-spacing: 0.18em;
      text-transform:uppercase;
      line-height: 0.95;
      font-size: clamp(44px, 7vw, 84px);
      color: var(--text);
    }

    .role{
      margin: 14px 0 0;
      font-weight:300;
      letter-spacing: 0.28em;
      text-transform:uppercase;
      font-size: clamp(12px, 2vw, 14px);
      color: var(--muted);
    }

    .links{
      margin-top: 18px;
      display:flex;
      gap: 14px;
      flex-wrap:wrap;
      align-items:center;
    }

    .link{
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform:uppercase;
      text-decoration:none;
      color: rgba(0,0,0,0.70);
      border-bottom: 1px solid rgba(0,0,0,0.22);
      padding-bottom: 3px;
    }

    .link:hover{
      color: rgba(0,0,0,0.92);
      border-bottom-color: rgba(0,0,0,0.55);
    }

    /* Optional “stamp” placement like the reference (remove if you don’t want it) */
    .stamp{
      position:absolute;
      right: clamp(18px, 4vw, 52px);
      bottom: clamp(18px, 4vw, 52px);
      width: clamp(54px, 7vw, 84px);
      height: auto;
      opacity: 0.9;
      filter: saturate(1.1);
    }

    /* Mobile: push copy to bottom-left like Hiro mobile example */
    @media (max-width: 700px){
      .hero{
        align-items:flex-end;
      }
      .copy{
        padding: 26px 22px 34px;
        max-width: none;
      }
      .name{
        font-size: clamp(44px, 10vw, 76px);
      }
      .role{
        margin-top: 10px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="overlay"></div>

    <div class="copy">
      <h1 class="name">Jai<br>Benjamin</h1>
      <div class="role">Actor • Toronto</div>

      <div class="links">
        <a class="link" href="https://www.imdb.com/name/nm13183508/" target="_blank" rel="noopener">IMDb</a>
        <a class="link" href="https://www.thecharacters.com/toronto" target="_blank" rel="noopener">The Characters</a>
      </div>
    </div>

    <!-- If you have a logo/stamp image, put it in your repo and set src below.
         Otherwise delete this <img> entirely. -->
    <!-- <img class="stamp" src="stamp.png" alt="" /> -->
  </section>
</body>
</html>
