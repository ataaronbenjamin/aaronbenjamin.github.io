<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jai Benjamin | Actor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#fff;
      --muted: rgba(255,255,255,0.78);
      --muted2: rgba(255,255,255,0.65);
      --border: rgba(255,255,255,0.22);
    }

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:#000;
    }

    .hero{
      min-height:100vh;
      background-image:url("headshot2.jpeg");
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:flex-end;          /* move content to bottom */
      justify-content:center;
      text-align:center;
      position:relative;
      padding: 48px 20px 70px;       /* extra bottom padding */
    }

    .overlay{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 35%, rgba(0,0,0,0.08), rgba(0,0,0,0.38) 60%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.20), rgba(0,0,0,0.45));
    }

    .content{
      position:relative;
      z-index:2;
      max-width: 900px;
      padding: 32px 32px 28px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      background: rgba(0,0,0,0.10);
      backdrop-filter: blur(2px);
    }

    h1{
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 600;
      font-size: clamp(40px, 5.2vw, 76px);
      margin: 0;
      letter-spacing: 0.2px;
      line-height: 1.03;
    }

    .subtitle{
      margin: 12px 0 0;
      font-size: clamp(15px, 1.8vw, 18px);
      color: var(--muted);
      letter-spacing: 0.4px;
      font-weight: 400;
    }

    .agency{
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--muted2);
    }

    .agency a{
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.30);
      padding-bottom: 2px;
    }

    .agency a:hover{
      border-bottom-color: rgba(255,255,255,0.85);
    }

    .actions{
      display:flex;
      gap: 12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top: 22px;
    }

    .button{
      padding: 11px 16px;
      border-radius: 12px;
      text-decoration:none;
      font-size: 14px;
      font-weight: 600;
      transition: transform .15s ease, background .15s ease, color .15s ease, border-color .15s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width: 140px;
    }

    .button.primary{
      background: #fff;
      color:#000;
      border: 1px solid rgba(255,255,255,0.95);
    }

    .button.secondary{
      background: rgba(0,0,0,0.12);
      color:#fff;
      border: 1px solid var(--border);
    }

    .button:hover{
      transform: translateY(-1px);
    }

    .button.primary:hover{
      background: rgba(255,255,255,0.92);
    }

    .button.secondary:hover{
      border-color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.18);
    }

    @media (max-width: 520px){
      .content{ padding: 26px 18px 22px; }
      .button{ width: 100%; max-width: 320px; }
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>Jai Benjamin</h1>
      <p class="subtitle">Actor • Toronto</p>

      <p class="agency">
        Represented by <a href="https://www.thecharacters.com/toronto" target="_blank" rel="noopener">The Characters</a>
      </p>

      <div class="actions">
        <a class="button primary" href="https://www.imdb.com/name/nm13183508/" target="_blank" rel="noopener">
          View IMDb
        </a>
        <a class="button secondary" href="https://www.thecharacters.com/toronto" target="_blank" rel="noopener">
          Agency
        </a>
      </div>
    </div>
  </div>
</body>
</html>
